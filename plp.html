        if (user) {
            let adminLink = user.role === 'admin' ? `<a href="admin/dashboard.html" style="color: #ff9900;">Back Office</a>` : '';
            authUI.innerHTML = `
                ${adminLink}
                <span style="color: white; margin: 0 10px;">Hi, ${user.email.split('@')[0]}</span>
                <a href="#" onclick="auth.logout()">Logout</a>
            `;
        } else {
            authUI.innerHTML = `
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            `;
        }
    }
    renderNav();

<div class="container">
        <h2 style="margin: 20px 0;">Our Products</h2>
        <div id="product-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding-bottom: 50px;">
            <p id="loading-msg">Loading products...</p>
        </div>
    </div>

    <script src="js/analytics.js"></script>

    <script>
        // 2. Initialize Adobe Analytics Data Layer
        window.digitalData = window.digitalData || {}; 
        digitalData.page = { 
            pageName: "product_listing", 
            pageType: "plp" 
        };

        // 3. Fetch THE LIST of products (No ID needed here)
        fetch('https://dummyjson.com/products')
            .then(res => {
                if (!res.ok) throw new Error("Could not connect to API");
                return res.json();
            })
            .then(data => {
                const listDiv = document.getElementById('product-list');
                const products = data.products.slice(0, 20); // Get 20 products
                
                listDiv.innerHTML = ''; // Clear the "Loading..." message

                products.forEach(p => {
                    const card = document.createElement('div');
                    card.style.cssText = "background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee;";
                    
                    // The link below passes the ID to the PDP page
                    card.innerHTML = `
                        <img src="${p.thumbnail}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 5px;">
                        <h3 style="font-size: 1rem; margin: 10px 0; min-height: 40px;">${p.title}</h3>
                        <p style="font-size: 1.2rem; color: #B12704; font-weight: bold;">$${p.price}</p>
                        <a href="pdp.html?id=${p.id}" style="display: block; text-align: center; padding: 10px; background: #007185; color: white; text-decoration: none; border-radius: 4px; margin-top: 10px; font-weight: bold;">View Product</a>
                    `;
                    listDiv.appendChild(card);
                });

                // 4. Safe Analytics Call
                if (typeof analytics !== 'undefined' && analytics.trackPageView) {
                    analytics.trackPageView();
                }
            })
            .catch(err => {
                console.error('PLP Error:', err);
                document.getElementById('product-list').innerHTML = `<p style="color: red;">Failed to load products. Error: ${err.message}</p>`;
            });
    </script>
